services:
  - type: web
    name: p2p-web-share-signaling
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CLIENT_ORIGIN
        sync: false
      - key: ROOM_TTL_MS
        sync: false
      # Optional TURN relay for restrictive/symmetric NATs.
      # - key: TURN_URL
      #   sync: false
      # - key: TURN_USERNAME
      #   sync: false
      # - key: TURN_CREDENTIAL
      #   sync: false
